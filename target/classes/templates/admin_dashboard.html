<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>QCM-NET | Dashboard Admin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-green: #00ff66;
            --bg-body: #10141d;
            --panel-bg: #1a1f2b;
            --input-bg: #242b3d;
            --text-main: #e2e8f0;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-body); color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.4; }

        .dashboard-container {
            position: relative; z-index: 10;
            max-width: 1200px; margin: 0 auto; padding: 30px;
        }

        .nav-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding: 15px 25px;
            background: var(--panel-bg); border-bottom: 2px solid var(--neon-green);
            border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .panel {
            background: var(--panel-bg); padding: 35px;
            border-radius: 16px; margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h2, h3 {
            color: white; margin-top: 0;
            display: flex; align-items: center; gap: 15px;
            font-weight: 600;
        }
        h2 i, h3 i { color: var(--neon-green); }

        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }

        th {
            background: var(--input-bg); color: var(--neon-green);
            padding: 18px 15px; text-align: left; font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 1px;
        }

        td {
            padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.95rem; color: #cbd5e1;
        }

        tr:hover { background: rgba(255,255,255,0.02); }

        .btn-delete {
            color: #ff5f5f; border: 1px solid #ff5f5f;
            padding: 8px 12px; border-radius: 6px; transition: 0.3s;
        }
        .btn-delete:hover { background: #ff5f5f; color: white; }

        .export-actions {
            display: flex; gap: 15px; margin-bottom: 20px;
        }
        .btn-export {
            padding: 10px 20px; border-radius: 8px; text-decoration: none;
            font-weight: bold; font-size: 0.85rem; display: flex; align-items: center; gap: 10px;
            transition: 0.3s;
        }
        .btn-pdf { color: white; border: 1px solid #e74c3c; }
        .btn-pdf:hover { background: #e74c3c; }
        .btn-excel { color: white; border: 1px solid #27ae60; }
        .btn-excel:hover { background: #27ae60; }

        label { color: var(--neon-green); font-weight: 500; margin-bottom: 8px; display: block; }

        input, select {
            width: 100%; padding: 12px 15px; background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            color: white; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--neon-green); outline: none; background: #2d364d; }

        .btn-add {
            background: var(--neon-green); color: #000;
            border: none; padding: 16px; border-radius: 8px;
            font-weight: 700; cursor: pointer; width: 100%;
            font-size: 1rem; transition: 0.3s; margin-top: 10px;
        }
        .btn-add:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 102, 0.3); }

        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="dashboard-container">
    <div class="nav-bar">
        <span><i class="fas fa-user-cog"></i> MODE ADMINISTRATEUR</span>
        <a th:href="@{/logout}" style="color: #94a3b8; text-decoration: none;"><i class="fas fa-sign-out-alt"></i> Quitter</a>
    </div>

    <div class="panel">
        <h2><i class="fas fa-chart-line"></i> Analyse des Performances par Module</h2>
        <div style="height: 300px; margin-top: 20px;">
            <canvas id="performanceChart"></canvas>
        </div>
    </div>

    <div class="panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2><i class="fas fa-list"></i> Liste des Questions</h2>
            <div class="export-actions">
                <a th:href="@{/admin/export/pdf}" class="btn-export btn-pdf"><i class="fas fa-file-pdf"></i> PDF</a>
                <a th:href="@{/admin/export/excel}" class="btn-export btn-excel"><i class="fas fa-file-excel"></i> Excel</a>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Intitulé de la Question</th>
                    <th>Réponse Correcte</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="q : ${questions}">
                    <td th:text="${q.id}">1</td>
                    <td th:text="${q.question}">Chargement...</td>
                    <td><span style="color: var(--neon-green); background: rgba(0,255,102,0.1); padding: 4px 10px; border-radius: 4px;" th:text="${q.reponseCorrecte}">Réponse</span></td>
                    <td>
                        <a th:href="@{'/admin/delete/' + ${q.id}}" class="btn-delete" onclick="return confirm('Supprimer ?')">
                            <i class="fas fa-trash-alt"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="panel">
        <h3><i class="fas fa-plus"></i> Ajouter une Question</h3>
        <form th:action="@{/admin/add}" th:object="${nouvelleQuestion}" method="post">
            <div class="form-group" style="margin-bottom:20px;">
                <label>Module / Matière</label>
                <select name="matiere.id" required>
                    <option value="">-- Sélectionner --</option>
                    <option th:each="m : ${matieres}" th:value="${m.id}" th:text="${m.nom}"></option>
                </select>
            </div>

            <div class="form-group" style="margin-bottom:20px;">
                <label>Texte de la question</label>
                <input type="text" name="question" placeholder="Ex: Quel est le moteur de rendu de Chrome ?" required>
            </div>

            <div class="grid-layout">
                <div class="form-group"><label>Option A</label><input type="text" name="option1" required></div>
                <div class="form-group"><label>Option B</label><input type="text" name="option2" required></div>
                <div class="form-group"><label>Option C</label><input type="text" name="option3" required></div>
                <div class="form-group"><label>Option D</label><input type="text" name="option4" required></div>
            </div>

            <div class="form-group" style="margin-top:20px;">
                <label>Validation (Identique à la bonne option)</label>
                <input type="text" name="reponseCorrecte" required>
            </div>

            <button type="submit" class="btn-add">ENREGISTRER LA DONNÉE</button>
        </form>
    </div>
</div>

<script th:inline="javascript">
    // --- INITIALISATION CHART.JS AVEC DONNÉES DYNAMIQUES ---
    // Thymeleaf remplace ces variables par les données réelles de MySQL
    const labelsMatiere = [[${labels}]];
    const dataPerformance = [[${dataPoints}]];

    const ctx = document.getElementById('performanceChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labelsMatiere,
            datasets: [{
                label: 'Moyenne des notes (/20)',
                data: dataPerformance,
                backgroundColor: 'rgba(0, 255, 102, 0.2)',
                borderColor: '#00ff66',
                borderWidth: 2,
                borderRadius: 5
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 20, // Fixé à 20 pour la cohérence des notes
                    grid: { color: 'rgba(255,255,255,0.1)' },
                    ticks: { color: '#cbd5e1' }
                },
                x: {
                    grid: { display: false },
                    ticks: { color: '#cbd5e1' }
                }
            },
            plugins: {
                legend: { labels: { color: '#e2e8f0', font: { family: 'Inter' } } }
            }
        }
    });

    // --- FOND PLEXUS ---
    let scene, camera, renderer, points;
    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.z = 1000;
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const geometry = new THREE.BufferGeometry();
        const pos = new Float32Array(1200 * 3);
        for(let i=0; i<1200*3; i++) pos[i] = (Math.random()-0.5) * 2000;
        geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const material = new THREE.PointsMaterial({ color: 0x00ff66, size: 2, transparent: true, opacity: 0.3 });
        points = new THREE.Points(geometry, material);
        scene.add(points);
        animate();
    }
    function animate() {
        requestAnimationFrame(animate);
        points.rotation.y += 0.0003;
        renderer.render(scene, camera);
    }
    init3D();
</script>
</body>
</html>
